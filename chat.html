<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Erik · Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   CSS VARIABLES — WHATSAPP STYLE
══════════════════════════════════════ */
:root {
  /* Light mode (WhatsApp) */
  --bg-app: #f0f2f5;
  --bg-chat: #efeae2;
  --bg-chat-pattern: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  --bg-out: #d9fdd3;
  --bg-in: #ffffff;
  --bg-header: #008069;
  --bg-input: #ffffff;
  --bg-sidebar: #ffffff;
  --text-primary: #111b21;
  --text-secondary: #667781;
  --text-timestamp: #667781;
  --text-header: #ffffff;
  --border: #e9edef;
  --accent: #00a884;
  --accent-hover: #017561;
  --icon: #54656f;
  --thinking-bg: #fef9ef;
  --thinking-border: #f0e6d0;
  --thinking-text: #7c6d4f;
  --tool-bg: #f0f4f9;
  --tool-border: #d3dce6;
  --tool-text: #4a6785;
  --memory-bg: #f5f0ff;
  --memory-border: #e0d4f5;
  --memory-text: #6b4fa0;
  --reaction-bg: #ffffff;
  --reaction-border: #e2e2e2;
  --emoji-panel-bg: #ffffff;
  --context-green: #25d366;
  --context-yellow: #ffc107;
  --context-red: #ff5252;
  --font: 'DM Mono', monospace;
  --serif: 'Lora', serif;
  --r: 8px;
  --r-bubble: 7.5px;
}

[data-theme="dark"] {
  --bg-app: #111b21;
  --bg-chat: #0b141a;
  --bg-out: #005c4b;
  --bg-in: #202c33;
  --bg-header: #202c33;
  --bg-input: #2a3942;
  --bg-sidebar: #111b21;
  --text-primary: #e9edef;
  --text-secondary: #8696a0;
  --text-timestamp: #8696a0;
  --text-header: #e9edef;
  --border: #2a3942;
  --accent: #00a884;
  --accent-hover: #06cf9c;
  --icon: #aebac1;
  --thinking-bg: #1a1a10;
  --thinking-border: #3a3520;
  --thinking-text: #c4b078;
  --tool-bg: #0d1a26;
  --tool-border: #1a3048;
  --tool-text: #7aa8cc;
  --memory-bg: #1a1028;
  --memory-border: #2d1f48;
  --memory-text: #b89de0;
  --reaction-bg: #202c33;
  --reaction-border: #2a3942;
  --emoji-panel-bg: #202c33;
  --context-green: #25d366;
  --context-yellow: #ffc107;
  --context-red: #ff5252;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg-app); }
body { color:var(--text-primary); font-family:var(--font); font-size:14px; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:rgba(0,0,0,.15); border-radius:4px; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.app { display:flex; height:100%; }

/* Sidebar */
.sidebar {
  width:320px; background:var(--bg-sidebar); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0;
}
.sidebar-header {
  padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
  background:var(--bg-header);
}
.sidebar-title { font-family:var(--serif); font-size:16px; color:var(--text-header); }
.sidebar-actions { display:flex; gap:12px; align-items:center; }
.sidebar-actions button {
  background:none; border:none; color:var(--text-header); cursor:pointer;
  font-size:16px; opacity:.8; transition:opacity .15s;
}
.sidebar-actions button:hover { opacity:1; }

/* Session list */
.session-list { flex:1; overflow-y:auto; }
.session-item {
  padding:12px 16px; display:flex; gap:12px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background .1s;
  margin-bottom:2px;
}
.session-item:hover { background:var(--bg-chat); }
.session-item.active { background:var(--bg-chat); }
.session-avatar {
  width:40px; height:40px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:18px; color:#fff; flex-shrink:0;
}
.session-info { flex:1; min-width:0; }
.session-name { font-size:13px; font-weight:500; margin-bottom:2px; }
.session-preview { font-size:12px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.session-meta { text-align:right; flex-shrink:0; }
.session-time { font-size:11px; color:var(--text-secondary); }

/* Main chat area */
.chat-main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* Chat header */
.chat-header {
  padding:10px 16px; background:var(--bg-header); display:flex;
  align-items:center; gap:12px; flex-shrink:0; min-height:56px;
}
.chat-header-back {
  display:none; background:none; border:none; color:var(--text-header);
  cursor:pointer; font-size:20px; padding:0 4px;
}
.chat-header-avatar {
  width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.15);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:16px; color:var(--text-header);
}
.chat-header-info { flex:1; }
.chat-header-name { font-size:14px; font-weight:500; color:var(--text-header); }
.chat-header-status { font-size:11px; color:rgba(255,255,255,.7); }
.chat-header-actions { display:flex; gap:8px; align-items:center; }
.chat-header-actions select {
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
  color:var(--text-header); font-family:var(--font); font-size:11px;
  padding:4px 8px; border-radius:4px; outline:none; cursor:pointer;
}
.chat-header-actions select option { background:var(--bg-in); color:var(--text-primary); }

/* Context bar */
.context-bar {
  padding:4px 16px; background:var(--bg-sidebar); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; font-size:11px; flex-shrink:0;
}
.context-progress {
  flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden;
}
.context-fill {
  height:100%; border-radius:2px; transition:width .3s, background-color .3s;
}
.context-text { color:var(--text-secondary); white-space:nowrap; }
.memory-toggle {
  display:flex; align-items:center; gap:4px; cursor:pointer;
  font-size:11px; color:var(--text-secondary);
}
.memory-toggle input { display:none; }
.toggle-track {
  width:28px; height:16px; border-radius:8px; background:var(--border);
  position:relative; transition:background .2s;
}
.toggle-track::after {
  content:''; position:absolute; top:2px; left:2px;
  width:12px; height:12px; border-radius:50%; background:#fff;
  transition:transform .2s;
}
.memory-toggle input:checked + .toggle-track {
  background:var(--accent);
}
.memory-toggle input:checked + .toggle-track::after {
  transform:translateX(12px);
}

/* Keepalive status indicator */
.keepalive-status {
  font-size:10px; color:var(--text-secondary); margin-left:2px; min-width:16px;
}
.keepalive-status.ok { color:var(--context-green); }
.keepalive-status.fail { color:var(--context-red); }

/* Context section */
.ctx-section {
  padding:12px 16px; flex:1; display:flex; flex-direction:column; overflow:hidden;
}
.ctx-header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;
}
.ctx-header span { font-size:13px; font-weight:500; }
.ctx-generate-btn {
  background:var(--accent); border:none; color:#fff;
  font-family:var(--font); font-size:11px; padding:4px 12px;
  border-radius:4px; cursor:pointer; transition:background .15s;
}
.ctx-generate-btn:hover { background:var(--accent-hover); }
.ctx-generate-btn:disabled { opacity:.5; cursor:not-allowed; }
.ctx-list { flex:1; overflow-y:auto; }
.ctx-item {
  background:var(--bg-input); border:1px solid var(--border);
  border-radius:6px; padding:8px 28px 8px 10px; margin-bottom:6px;
  font-size:12px; line-height:1.6; position:relative;
}
.ctx-item-date {
  font-size:10px; color:var(--text-secondary); margin-bottom:3px;
}
.ctx-item-content { outline:none; }
.ctx-item-content:focus { border-bottom:1px dashed var(--accent); }
.ctx-item-actions {
  position:absolute; top:6px; right:6px;
}
.ctx-item-actions button {
  background:none; border:none; cursor:pointer;
  font-size:13px; color:var(--text-secondary); padding:0 2px;
}
.ctx-item-actions button:hover { color:var(--context-red); }
.ctx-status {
  font-size:11px; padding:4px 0; text-align:center; color:var(--text-secondary);
}

/* Messages area */
.messages {
  flex:1; overflow-y:auto; padding:8px 60px; display:flex;
  flex-direction:column; gap:8px; background:var(--bg-chat);
  scroll-behavior:smooth;
}

/* Message row */
.msg-row { display:flex; max-width:65%; position:relative; margin-bottom:4px; }
.msg-row.out { align-self:flex-end; }
.msg-row.in { align-self:flex-start; }

/* Bubble */
.bubble {
  padding:6px 7px 8px 9px; border-radius:var(--r-bubble);
  position:relative; min-width:80px; line-height:1.6; font-size:13.5px;
  word-wrap:break-word; overflow-wrap:break-word;
}
.msg-row.out .bubble {
  background:var(--bg-out); border-top-right-radius:0;
}
.msg-row.in .bubble {
  background:var(--bg-in); border-top-left-radius:0;
}

/* Per-message usage */
.msg-usage {
  font-size:10px; color:var(--text-secondary); margin-top:4px;
  padding-top:3px; border-top:1px dashed var(--border);
  letter-spacing:.02em; opacity:.7;
}

/* Timestamp inside bubble */
.msg-time {
  float:right; font-size:10.5px; color:var(--text-timestamp);
  margin:4px 0 -4px 8px; line-height:1;
}

/* Thinking block */
.thinking-block {
  background:var(--thinking-bg); border:1px solid var(--thinking-border);
  border-radius:6px; padding:0; margin-bottom:6px; overflow:hidden;
  font-size:12px; color:var(--thinking-text);
}
.thinking-header {
  padding:6px 10px; cursor:pointer; display:flex; align-items:center; gap:6px;
  font-size:11px; letter-spacing:.03em;
}
.thinking-header::before { content:'💭'; font-size:13px; }
.thinking-arrow { transition:transform .2s; font-size:10px; margin-left:auto; }
.thinking-block.open .thinking-arrow { transform:rotate(90deg); }
.thinking-content {
  padding:0 10px 8px; display:none; line-height:1.7;
  white-space:pre-wrap; border-top:1px solid var(--thinking-border);
}
.thinking-block.open .thinking-content { display:block; padding-top:8px; }

/* Tool call block */
.tool-block {
  background:var(--tool-bg); border:1px solid var(--tool-border);
  border-radius:6px; padding:0; margin-bottom:6px; overflow:hidden;
  font-size:12px; color:var(--tool-text);
}
.tool-header {
  padding:6px 10px; cursor:pointer; display:flex; align-items:center; gap:6px;
  font-size:11px;
}
.tool-header::before { content:'🔧'; font-size:12px; }
.tool-arrow { transition:transform .2s; font-size:10px; margin-left:auto; }
.tool-block.open .tool-arrow { transform:rotate(90deg); }
.tool-content {
  padding:0 10px 8px; display:none; line-height:1.6;
  white-space:pre-wrap; border-top:1px solid var(--tool-border);
  font-family:var(--font); font-size:11px;
}
.tool-block.open .tool-content { display:block; padding-top:8px; }

/* Memory injection block */
.memory-block {
  background:var(--memory-bg); border:1px solid var(--memory-border);
  border-radius:6px; padding:0; margin-bottom:6px; overflow:hidden;
  font-size:12px; color:var(--memory-text);
}
.memory-header {
  padding:6px 10px; cursor:pointer; display:flex; align-items:center; gap:6px;
  font-size:11px;
}
.memory-header::before { content:'📎'; font-size:12px; }
.memory-arrow { transition:transform .2s; font-size:10px; margin-left:auto; }
.memory-block.open .memory-arrow { transform:rotate(90deg); }
.memory-content {
  padding:0 10px 8px; display:none; line-height:1.7;
  border-top:1px solid var(--memory-border);
}
.memory-block.open .memory-content { display:block; padding-top:8px; }
.memory-item { padding:3px 0; border-bottom:1px dashed var(--memory-border); }
.memory-item:last-child { border-bottom:none; }
.memory-source { font-size:9px; letter-spacing:.1em; opacity:.7; }

/* Emoji reactions */
.reactions {
  display:flex; gap:2px; flex-wrap:wrap; margin-top:4px;
}
.reaction {
  background:var(--reaction-bg); border:1px solid var(--reaction-border);
  border-radius:12px; padding:1px 6px; font-size:15px; cursor:pointer;
  transition:transform .1s;
}
.reaction:hover { transform:scale(1.2); }
.reaction.mine { border-color:var(--accent); background:rgba(0,168,132,.08); }
.emoji-trigger {
  background:none; border:none; cursor:pointer;
  font-size:12px; color:var(--text-secondary); padding:1px 4px;
  opacity:0; transition:opacity .15s; margin-left:4px;
}
.msg-row:hover .emoji-trigger { opacity:0.5; }
.emoji-trigger:hover { opacity:1; }
@media (max-width: 768px) {
  .emoji-trigger { opacity:0.4; }
}

/* Image preview */
.img-preview-wrap {
  position:relative; margin-bottom:4px; max-width:280px;
}
.img-preview-wrap img {
  width:100%; border-radius:6px; display:block; cursor:pointer;
}
.img-preview-wrap .img-caption {
  font-size:11px; color:var(--text-secondary); margin-top:2px;
}
/* Image in bubble */
.bubble-img {
  max-width:280px; border-radius:6px; margin-bottom:4px; cursor:pointer;
  display:block;
}
/* Image upload preview bar */
.upload-preview {
  display:none; padding:6px 10px; background:var(--bg-sidebar);
  border-top:1px solid var(--border); align-items:center; gap:8px;
}
.upload-preview.show { display:flex; }
.upload-preview img {
  width:48px; height:48px; border-radius:6px; object-fit:cover;
}
.upload-preview .upload-name {
  flex:1; font-size:11px; color:var(--text-secondary);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.upload-preview .upload-remove {
  background:none; border:none; color:var(--text-secondary);
  cursor:pointer; font-size:16px; padding:4px;
}

/* Settings panel */
.settings-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50;
}
.settings-overlay.open { display:flex; align-items:center; justify-content:center; }
.settings-box {
  background:var(--bg-sidebar); border-radius:12px; padding:24px;
  width:90%; max-width:400px; max-height:80vh; overflow-y:auto;
}
.settings-title {
  font-family:var(--serif); font-size:18px; margin-bottom:16px;
  display:flex; justify-content:space-between; align-items:center;
}
.settings-close {
  background:none; border:none; color:var(--text-secondary);
  font-size:20px; cursor:pointer;
}
.settings-group {
  margin-bottom:16px;
}
.settings-label {
  font-size:11px; letter-spacing:.1em; color:var(--text-secondary);
  margin-bottom:8px; display:block;
}
.settings-row {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.avatar-preview {
  width:56px; height:56px; border-radius:50%; object-fit:cover;
  border:2px solid var(--border);
}
.bg-option {
  width:48px; height:48px; border-radius:6px; cursor:pointer;
  border:2px solid transparent; transition:border-color .15s;
}
.bg-option:hover, .bg-option.active { border-color:var(--accent); }
.settings-upload-btn {
  background:var(--accent); color:#fff; border:none; font-family:var(--font);
  font-size:11px; padding:6px 14px; border-radius:6px; cursor:pointer;
}

/* Image lightbox */
.lightbox {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.9);
  z-index:100; align-items:center; justify-content:center; cursor:pointer;
}
.lightbox.open { display:flex; }
.lightbox img {
  max-width:92vw; max-height:90vh; object-fit:contain; border-radius:4px;
}

/* Emoji picker */
.emoji-picker {
  display:none; position:absolute; bottom:calc(100% + 4px); right:0;
  background:var(--emoji-panel-bg); border:1px solid var(--border);
  border-radius:var(--r); padding:8px; box-shadow:0 4px 12px rgba(0,0,0,.15);
  z-index:20;
}
.emoji-picker.show { display:flex; flex-wrap:wrap; gap:4px; max-width:260px; }
.emoji-option {
  font-size:22px; cursor:pointer; padding:4px; border-radius:4px;
  transition:background .1s;
}
.emoji-option:hover { background:var(--border); }

/* Input area */
.input-area {
  padding:8px 10px; background:var(--bg-app); display:flex;
  align-items:flex-end; gap:8px; flex-shrink:0;
}
.input-box {
  flex:1; background:var(--bg-input); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; font-family:var(--font);
  font-size:13px; color:var(--text-primary); outline:none;
  resize:none; min-height:42px; max-height:120px; line-height:1.5;
}
.input-box::placeholder { color:var(--text-secondary); }
.input-box:focus { border-color:var(--accent); }
.send-btn {
  width:42px; height:42px; border-radius:50%; background:var(--accent);
  border:none; color:#fff; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s; flex-shrink:0;
}
.send-btn:hover { background:var(--accent-hover); }
.send-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Typing indicator */
.typing { display:none; align-self:flex-start; padding:4px 0; }
.typing.show { display:flex; }
.typing-bubble {
  background:var(--bg-in); border-radius:var(--r-bubble); border-top-left-radius:0;
  padding:10px 14px; display:flex; gap:4px;
}
.typing-dot {
  width:6px; height:6px; border-radius:50%; background:var(--text-secondary);
  animation:typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay:.2s; }
.typing-dot:nth-child(3) { animation-delay:.4s; }
@keyframes typingBounce {
  0%,60%,100% { transform:translateY(0); }
  30% { transform:translateY(-4px); }
}

/* Empty state */
.empty-state {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; color:var(--text-secondary); background:var(--bg-chat);
}
.empty-icon { font-size:64px; opacity:.3; margin-bottom:16px; }
.empty-text { font-size:13px; }

/* Menu button */
.menu-btn {
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
  color:var(--text-header); font-size:14px; padding:4px 8px; border-radius:4px;
  cursor:pointer; font-family:var(--font); transition:background .15s;
}
.menu-btn:hover { background:rgba(255,255,255,.2); }

/* Side Panel (☰) */
.mcp-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50;
}
.mcp-overlay.open { display:flex; justify-content:flex-end; }
.mcp-panel {
  width:340px; max-width:90vw; height:100%; background:var(--bg-sidebar);
  display:flex; flex-direction:column; box-shadow:-4px 0 20px rgba(0,0,0,.15);
}
.mcp-panel-header {
  padding:0; display:flex; align-items:center;
  border-bottom:1px solid var(--border); position:relative;
}
.panel-close-btn {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; font-size:18px; cursor:pointer;
  color:var(--text-secondary); padding:4px;
}
.panel-close-btn:hover { color:var(--text-primary); }
.panel-back-btn {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; font-size:16px; cursor:pointer;
  color:var(--text-secondary); padding:4px;
}
.panel-back-btn:hover { color:var(--text-primary); }
.panel-header-title {
  flex:1; text-align:center; font-family:var(--serif); font-size:14px; font-weight:500;
}
.panel-view { display:none; flex:1; flex-direction:column; overflow:hidden; }
.panel-view.active { display:flex; }
.panel-menu { flex:1; overflow-y:auto; }
.panel-menu-item {
  display:flex; align-items:center; gap:12px;
  padding:16px 20px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .12s;
}
.panel-menu-item:hover { background:var(--bg-input); }
.panel-menu-icon { font-size:20px; flex-shrink:0; }
.panel-menu-label { font-family:var(--serif); font-size:14px; }
.panel-menu-arrow {
  margin-left:auto; color:var(--text-secondary); font-size:12px;
}
.mcp-panel-body { flex:1; overflow-y:auto; padding:8px 0; }

.mcp-server {
  padding:12px 16px; border-bottom:1px solid var(--border);
}
.mcp-server-header {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.mcp-server-name { font-size:13px; font-weight:500; }
.mcp-server-url { font-size:10px; color:var(--text-secondary); margin-top:2px; word-break:break-all; }
.mcp-server-actions { display:flex; align-items:center; gap:8px; }
.mcp-toggle {
  position:relative; width:36px; height:20px; border-radius:10px;
  background:var(--border); cursor:pointer; transition:background .2s;
  border:none; padding:0;
}
.mcp-toggle.on { background:var(--accent); }
.mcp-toggle::after {
  content:''; position:absolute; top:2px; left:2px;
  width:16px; height:16px; border-radius:50%; background:#fff;
  transition:transform .2s;
}
.mcp-toggle.on::after { transform:translateX(16px); }
.mcp-remove {
  background:none; border:none; color:var(--text-secondary);
  cursor:pointer; font-size:14px; padding:2px; opacity:.5;
  transition:opacity .15s;
}
.mcp-remove:hover { opacity:1; color:var(--context-red); }

.mcp-add-section {
  padding:12px 16px; border-top:1px solid var(--border);
}
.mcp-input {
  flex:1; background:var(--bg-input); border:1px solid var(--border);
  border-radius:4px; padding:6px 8px; font-family:var(--font);
  font-size:11px; color:var(--text-primary); outline:none;
}
.mcp-input:focus { border-color:var(--accent); }
.mcp-add-btn {
  background:var(--accent); color:#fff; border:none; border-radius:4px;
  width:32px; font-size:16px; cursor:pointer; font-family:var(--font);
}

/* ══════════════════════════════════════
   MOBILE
══════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { width:100%; position:absolute; inset:0; z-index:10; }
  .app.chat-open .sidebar { display:none; }
  .chat-main { display:none; }
  .app.chat-open .chat-main { display:flex; }
  .chat-header-back { display:block; }
  .messages { padding:8px 12px; }
  .msg-row { max-width:85%; }
}

/* ══════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════ */
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.msg-row { animation:fadeIn .15s ease; }

/* Session delete button */
.session-delete {
  background:none; border:none; color:var(--text-secondary);
  cursor:pointer; font-size:12px; padding:2px 4px;
  opacity:0; transition:opacity .15s, color .15s; margin-top:4px;
}
.session-item:hover .session-delete { opacity:0.5; }
.session-delete:hover { opacity:1 !important; color:var(--context-red); }

/* Message edit button */
.msg-edit {
  background:none; border:none; cursor:pointer;
  color:var(--text-secondary); font-size:13px;
  opacity:0; transition:opacity .15s; padding:4px 6px;

.msg-row.out:hover .msg-edit { opacity:0.5; }
.msg-edit:hover { opacity:1 !important; }

/* Send button stop state */
.send-btn.stopping {
  background:var(--context-red);
}

@media (max-width: 768px) {
  .session-delete { opacity:0.3; }
  .msg-edit { opacity:0.3; }
}
</style>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
// WS gateway: always connect to chat subdomain
const WS_URL = 'wss://chat.erikssheep.uk/ws';
const MCP_API = 'https://erikssheep.uk';
const EMOJIS = ['❤️','😂','😮','😢','🙏','👍','🔥','💀','🥺','(￣ω￣)','(*≧ω≦)','♥'];

let ws = null;
let currentSessionId = null;
let sessions = [];
let messageElements = {};  // msgId → DOM element
let isStreaming = false;
let contextUsed = 0;
let contextTotal = 200000;

/* ══════════════════════════════════════
   THEME
══════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('chat-theme', isDark ? 'light' : 'dark');
}
// init theme
(function() {
  const saved = localStorage.getItem('chat-theme') || 'light';
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    setTimeout(() => { document.getElementById('theme-btn').textContent = '☀️'; }, 0);
  }
})();

/* ══════════════════════════════════════
   WEBSOCKET
══════════════════════════════════════ */
let reconnectDelay = 1000;

function connectWS() {
  updateStatus('connecting...');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log('[ws] connected to', WS_URL);
    reconnectDelay = 1000;
    updateStatus('online');
    wsSend('session:list', {});
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleWSMessage(data);
    } catch(err) {
      console.warn('[ws] parse error:', err);
    }
  };

  ws.onclose = () => {
    updateStatus('reconnecting...');
    setTimeout(connectWS, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
  };

  ws.onerror = (err) => {
    console.error('[ws] error:', err);
  };
}

function wsSend(event, payload) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ event, ...payload }));
  }
}

function handleWSMessage(data) {
  const event = data.event || data.type || '';

  switch(event) {
    case 'session:list':
      sessions = data.sessions || [];
      renderSessions();
      break;

    case 'session:created':
      currentSessionId = data.sessionId;
      clearMessages();
      renderSessions();
      break;

    case 'stream:text':
    case 'stream:delta':
      appendStreamText(data.text || data.delta || '');
      break;

    case 'stream:thinking':
      appendThinking(data.text || '');
      break;

    case 'stream:block':
      if (data.block?.type === 'tool_use') {
        addToolCall(data.block);
      }
      break;

    case 'message:complete':
      finalizeMessage(data);
      break;

    case 'control:permission':
      // Auto-approve (CLI_BYPASS_PERMISSIONS=true)
      wsSend('chat:respond', { response: 'approve' });
      break;

    case 'session:history':
      renderHistory(data.messages || []);
      if (data.model) {
        document.getElementById('modelSelect').value = data.model;
      }
      if (data.effort) {
        document.getElementById('effortSelect').value = data.effort;
      }
      break;

    case 'system:usage':
      updateContext(data.usage);
      break;

    case 'system:error':
      showError(data.message || 'Unknown error');
      break;

    // Context management
    case 'context:generating':
      showCtxStatus('正在调用 DeepSeek 生成摘要…');
      break;
    case 'context:generated':
      showCtxStatus(`✓ 已生成 ${data.count || 0} 条摘要`, false);
      document.getElementById('ctxGenerateBtn').disabled = false;
      document.getElementById('ctxGenerateBtn').textContent = '生成摘要';
      wsSend('context:list', {});
      break;
    case 'context:list':
      renderContextItems(data.items || []);
      break;
    case 'context:error':
      showCtxStatus('✗ ' + (data.message || '生成失败'), true);
      document.getElementById('ctxGenerateBtn').disabled = false;
      document.getElementById('ctxGenerateBtn').textContent = '生成摘要';
      break;

    // Keepalive
    case 'keepalive:ok':
      showKeepaliveStatus('✓' + (data.time || ''), 'ok');
      break;
    case 'keepalive:fail':
      showKeepaliveStatus('✗', 'fail');
      break;
    case 'keepalive:status':
      break;

    default:
      console.log('[ws] unhandled:', event, data);
  }
}

/* ══════════════════════════════════════
   MESSAGES
══════════════════════════════════════ */
function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text && !pendingImage) return;
  if (isStreaming) return;

  hideEmpty();
  const msgArea = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row out';
  const time = formatTime(new Date());
  let imgHtml = '';
  if (pendingImage) {
    imgHtml = `<img class="bubble-img" src="${pendingImage.dataUrl}" onclick="openLightbox(this.src)">`;
  }
  row.innerHTML = `
    <button class="msg-edit" onclick="editMessage(this)" title="编辑">✎</button>
    <div class="bubble" oncontextmenu="showEmojiPicker(event, this)">
      ${imgHtml}
      <span class="msg-time">${time}</span>
      ${text ? escapeHtml(text) : ''}
      <div class="reactions"><button class="emoji-trigger" onclick="event.stopPropagation();showEmojiPicker(event,this.closest('.bubble'))">☺</button></div>
    </div>
  `;
  const rawSpan = document.createElement('span');
  rawSpan.hidden = true;
  rawSpan.className = 'msg-raw-text';
  rawSpan.textContent = text;
  row.appendChild(rawSpan);
  msgArea.appendChild(row);
  scrollToBottom();

  const payload = {
    message: text || '(image)',
    sessionId: currentSessionId,
  };

  if (pendingImage) {
    payload.content = [
      { type: 'image', source: { type: 'base64', media_type: pendingImage.type, data: pendingImage.base64 } }
    ];
    if (text) {
      payload.content.push({ type: 'text', text: text });
    }
  }

  wsSend('chat:send', payload);

  input.value = '';
  autoResize(input);
  clearUpload();
  showTyping(true);
  isStreaming = true;
  const btn = document.getElementById('sendBtn');
  btn.textContent = '■';
  btn.classList.add('stopping');
  btn.disabled = false;
}

function addUserMessage(text) {
  hideEmpty();
  const msgArea = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row out';
  const time = formatTime(new Date());
  row.innerHTML = `
    <div class="bubble" oncontextmenu="showEmojiPicker(event, this)">
      <span class="msg-time">${time}</span>
      ${escapeHtml(text)}
      <div class="reactions"><button class="emoji-trigger" onclick="event.stopPropagation();showEmojiPicker(event,this.closest('.bubble'))">☺</button></div>
    </div>
  `;
  msgArea.appendChild(row);
  scrollToBottom();
}

let currentAssistantRow = null;
let currentBubble = null;
let currentTextNode = null;
let streamedText = '';

function ensureAssistantBubble() {
  if (currentAssistantRow) return;
  hideEmpty();
  showTyping(false);

  const msgArea = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row in';
  const time = formatTime(new Date());
  row.innerHTML = `
    <div class="bubble" oncontextmenu="showEmojiPicker(event, this)">
      <div class="msg-meta-blocks"></div>
      <span class="msg-text"></span>
      <span class="msg-time">${time}</span>
      <div class="reactions"><button class="emoji-trigger" onclick="event.stopPropagation();showEmojiPicker(event,this.closest('.bubble'))">☺</button></div>
    </div>
  `;
  msgArea.appendChild(row);
  currentAssistantRow = row;
  currentBubble = row.querySelector('.bubble');
  currentTextNode = row.querySelector('.msg-text');
  streamedText = '';
}

function appendStreamText(text) {
  ensureAssistantBubble();
  streamedText += text;
  currentTextNode.innerHTML = renderMarkdown(streamedText);
  scrollToBottom();
}

function appendThinking(text) {
  ensureAssistantBubble();
  const metaArea = currentBubble.querySelector('.msg-meta-blocks');
  let block = metaArea.querySelector('.thinking-block');
  if (!block) {
    block = document.createElement('div');
    block.className = 'thinking-block';
    block.innerHTML = `
      <div class="thinking-header" onclick="this.parentElement.classList.toggle('open')">
        思考链 <span class="thinking-arrow">▸</span>
      </div>
      <div class="thinking-content"></div>
    `;
    metaArea.appendChild(block);
  }
  const content = block.querySelector('.thinking-content');
  content.textContent += text;
}

function addToolCall(block) {
  ensureAssistantBubble();
  const metaArea = currentBubble.querySelector('.msg-meta-blocks');
  const tool = document.createElement('div');
  tool.className = 'tool-block';
  tool.innerHTML = `
    <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
      Called ${escapeHtml(block.name || 'tool')} <span class="tool-arrow">▸</span>
    </div>
    <div class="tool-content">${escapeHtml(JSON.stringify(block.input || {}, null, 2))}</div>
  `;
  metaArea.appendChild(tool);
}

function addMemoryBlock(memories) {
  ensureAssistantBubble();
  const metaArea = currentBubble.querySelector('.msg-meta-blocks');
  const block = document.createElement('div');
  block.className = 'memory-block';
  const items = memories.map(m =>
    `<div class="memory-item"><span class="memory-source">[${m.source}]</span> ${escapeHtml(m.content)}</div>`
  ).join('');
  block.innerHTML = `
    <div class="memory-header" onclick="this.parentElement.classList.toggle('open')">
      搜到 ${memories.length} 条相关记忆 <span class="memory-arrow">▸</span>
    </div>
    <div class="memory-content">${items}</div>
  `;
  metaArea.appendChild(block);
}

function finalizeMessage(data) {
  isStreaming = false;
  showTyping(false);
  const btn = document.getElementById('sendBtn');
  btn.textContent = '➤';
  btn.classList.remove('stopping');
  btn.disabled = false;

  // Show per-message usage (turn_usage = this turn's cumulative API cost)
  const turnUsage = data.turn_usage || data.usage;
  if (currentBubble && turnUsage) {
    const u = turnUsage;
    const inp = u.input_tokens || 0;
    const out = u.output_tokens || 0;
    const cacheRead = u.cache_read_input_tokens || 0;
    const cacheCreate = u.cache_creation_input_tokens || 0;
    const cost = data.cost || 0;

    let parts = [];
    parts.push(`↑${fmtTokens(inp)}`);
    if (cacheRead) parts.push(`cache ${fmtTokens(cacheRead)}`);
    if (cacheCreate) parts.push(`+cache ${fmtTokens(cacheCreate)}`);
    parts.push(`↓${fmtTokens(out)}`);
    if (cost) parts.push(`$${cost.toFixed(4)}`);

    const usageEl = document.createElement('div');
    usageEl.className = 'msg-usage';
    usageEl.textContent = parts.join(' · ');
    currentBubble.appendChild(usageEl);
  }

  currentAssistantRow = null;
  currentBubble = null;
  currentTextNode = null;

  // Update context bar — use context_size (last API call's real window, not cumulative)
  const ctxUsage = data.context_size || turnUsage;
  if (data.session_usage || ctxUsage) {
    updateContextFromSession(data.session_usage, ctxUsage, data.cost);
  }
}

function fmtTokens(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}

/* ══════════════════════════════════════
   CONTEXT BAR
══════════════════════════════════════ */
function updateContext(usage) {
  if (!usage) return;
  const input = usage.input_tokens || 0;
  const output = usage.output_tokens || 0;
  contextUsed = input + output;
  renderContextBar();
}

function updateContextFromSession(su, msgUsage, cost) {
  // Context window = last API call's input total (output doesn't occupy next turn's window)
  if (msgUsage) {
    const inp = msgUsage.input_tokens || 0;
    const cacheRead = msgUsage.cache_read_input_tokens || 0;
    const cacheCreate = msgUsage.cache_creation_input_tokens || 0;
    contextUsed = inp + cacheRead + cacheCreate;
  }

  const sessionCost = su ? (su.total_cost || 0) : 0;
  const totalCacheRead = su ? (su.total_cache_read || 0) : 0;

  let label = `${fmtTokens(contextUsed)} / ${fmtTokens(contextTotal)}`;
  if (totalCacheRead) label += ` · cache ${fmtTokens(totalCacheRead)}`;
  if (sessionCost) label += ` · $${sessionCost.toFixed(4)}`;

  document.getElementById('contextText').textContent = label;

  const pct = Math.round((contextUsed / contextTotal) * 100);
  const fill = document.getElementById('contextFill');
  fill.style.width = pct + '%';
  if (pct < 40) fill.style.background = 'var(--context-green)';
  else if (pct < 70) fill.style.background = 'var(--context-yellow)';
  else fill.style.background = 'var(--context-red)';
}

function renderContextBar() {
  const pct = Math.round((contextUsed / contextTotal) * 100);
  const kUsed = (contextUsed / 1000).toFixed(1);
  const kTotal = (contextTotal / 1000).toFixed(0);

  document.getElementById('contextText').textContent = `${kUsed}k / ${kTotal}k (${pct}%)`;

  const fill = document.getElementById('contextFill');
  fill.style.width = pct + '%';
  if (pct < 40) fill.style.background = 'var(--context-green)';
  else if (pct < 70) fill.style.background = 'var(--context-yellow)';
  else fill.style.background = 'var(--context-red)';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatTime(d) {
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  // Very basic markdown: bold, italic, code
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px;font-size:12px;">$1</code>')
    .replace(/\n/g, '<br>');
}

}

function mcpSecret() {
  return localStorage.getItem('gmp_pw') || '';
}

function mcpHeaders() {
  return { 'Content-Type': 'application/json', 'x-secret': mcpSecret() };
}

function toggleMcpPanel() {
  const overlay = document.getElementById('mcpOverlay');
  if (overlay.classList.contains('open')) {
    closeMcpPanel();
  } else {
    overlay.classList.add('open');
    openPanelView('menu');
  }
}

function openPanelView(view) {
  document.getElementById('panelMenu').classList.toggle('active', view === 'menu');
  document.getElementById('panelCtx').classList.toggle('active', view === 'ctx');
  document.getElementById('panelMcp').classList.toggle('active', view === 'mcp');
  if (view === 'ctx') wsSend('context:list', {});
  if (view === 'mcp') loadMcpServers();
}

async function loadMcpServers() {
  const list = document.getElementById('mcpServerList');
  list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;">加载中...</div>';
  try {
    const r = await fetch(`${MCP_API}/api/mcp`, { headers: mcpHeaders() });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    renderMcpServers(data.servers || []);
  } catch(e) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--context-red);font-size:12px;">
      加载失败: ${e.message}<br><br>
      <span style="color:var(--text-secondary);font-size:10px;">请确认已从 Dashboard 进入（需要登录态）</span>
    </div>`;
  }
}

function closeMcpPanel() {
  document.getElementById('mcpOverlay').classList.remove('open');
}

function renderMcpServers(servers) {
  const list = document.getElementById('mcpServerList');

  if (servers.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;">
      暂无 MCP 服务器<br>在下方添加一个
    </div>`;
    return;
  }

  list.innerHTML = servers.map(s => {
    const safeName = escapeHtml(s.name);
    return `
    <div class="mcp-server" data-name="${safeName}">
      <div class="mcp-server-header">
        <div style="flex:1;min-width:0;">
          <div class="mcp-server-name">${safeName}</div>
          <div class="mcp-server-url">${escapeHtml(s.url || s.command || '')}</div>
          <div class="mcp-test-status" id="mcp-test-${safeName}" style="font-size:10px;margin-top:3px;min-height:14px;"></div>
        </div>
        <div class="mcp-server-actions">
          <button style="background:none;border:1px solid var(--border);color:var(--text-secondary);font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;font-family:var(--font);"
            onclick="testMcp('${safeName}')" title="测试连接">测试</button>
          <button class="mcp-toggle ${s.enabled ? 'on' : ''}"
            onclick="toggleMcp('${safeName}', ${!s.enabled})" title="${s.enabled ? '已启用' : '已禁用'}"></button>
          <button class="mcp-remove" onclick="removeMcp('${safeName}')" title="移除">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleMcp(name, enabled) {
  try {
    await fetch(`${MCP_API}/api/mcp/toggle`, {
      method: 'POST', headers: mcpHeaders(),
      body: JSON.stringify({ name, enabled })
    });
    await loadMcpServers();
  } catch(e) { showMcpStatus('切换失败: ' + e.message, true); }
}

async function removeMcp(name) {
  if (!confirm(`移除 MCP 服务器 "${name}"？`)) return;
  try {
    await fetch(`${MCP_API}/api/mcp/remove`, {
      method: 'POST', headers: mcpHeaders(),
      body: JSON.stringify({ name })
    });
    await loadMcpServers();
  } catch(e) { showMcpStatus('移除失败: ' + e.message, true); }
}

async function testMcp(name) {
  const el = document.getElementById('mcp-test-' + name);
  if (el) { el.textContent = '测试中...'; el.style.color = 'var(--text-secondary)'; }
  try {
    const r = await fetch(`${MCP_API}/api/mcp/test`, {
      method: 'POST', headers: mcpHeaders(),
      body: JSON.stringify({ name })
    });
    const data = await r.json();
    if (!el) return;
    el.textContent = (data.ok ? '✓ ' : '✗ ') + (data.message || '');
    el.style.color = data.ok ? 'var(--context-green)' : 'var(--context-red)';
  } catch(e) {
    if (el) { el.textContent = '✗ ' + e.message; el.style.color = 'var(--context-red)'; }
  }
}

function showMcpStatus(msg, isError) {
  const el = document.getElementById('mcpStatus');
  el.style.display = 'block';
  el.textContent = (isError ? '✗ ' : '✓ ') + msg;
  el.style.color = isError ? 'var(--context-red)' : 'var(--context-green)';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

async function addMcpServer() {
  const nameInput = document.getElementById('mcpAddName');
  const urlInput = document.getElementById('mcpAddUrl');
  const name = nameInput.value.trim();
  const url = urlInput.value.trim();

  if (!name || !url) {
    showMcpStatus('请填写名称和 URL', true);
    return;
  }

  const btn = document.getElementById('mcpAddBtn');
  btn.disabled = true;
  btn.textContent = '…';

  try {
    const r = await fetch(`${MCP_API}/api/mcp/add`, {
      method: 'POST', headers: mcpHeaders(),
      body: JSON.stringify({ name, url })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    showMcpStatus(`已添加 ${name}`, false);
    nameInput.value = '';
    urlInput.value = '';
    renderMcpServers(data.servers || []);
  } catch(e) {
    showMcpStatus('添加失败: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '+';
  }
}

function handleSendOrStop() {
  if (isStreaming) {
    stopGeneration();
  } else {
    sendMessage();
  }
}

function stopGeneration() {
  wsSend('chat:stop', {});
  isStreaming = false;
  showTyping(false);
  const btn = document.getElementById('sendBtn');
  btn.textContent = '➤';
  btn.classList.remove('stopping');
  btn.disabled = false;
  if (currentAssistantRow) {
    currentAssistantRow = null;
    currentBubble = null;
    currentTextNode = null;
  }
}

function deleteSession(id) {
  if (!confirm('删除这个对话？')) return;
  wsSend('session:delete', { sessionId: id });
  if (id === currentSessionId) {
    currentSessionId = null;
    clearMessages();
  }
}

function editMessage(btn) {
  if (isStreaming) return;
  const row = btn.closest('.msg-row');
  const raw = row.querySelector('.msg-raw-text');
  const text = raw ? raw.textContent : '';
  if (!text) return;
  const input = document.getElementById('inputBox');
  input.value = text;
  autoResize(input);
  input.focus();
}

/* ══════════════════════════════════════
   CONTEXT MANAGEMENT
══════════════════════════════════════ */
function generateContext() {
  const btn = document.getElementById('ctxGenerateBtn');
  btn.disabled = true;
  btn.textContent = '生成中…';
  wsSend('context:generate', {});
}

function renderContextItems(items) {
  const list = document.getElementById('ctxList');
  if (!items || items.length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text-secondary);text-align:center;padding:8px;">暂无上下文条目</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const safeId = escapeHtml(item.id || '');
    return `
    <div class="ctx-item" data-id="${safeId}">
      <div class="ctx-item-date">${escapeHtml(item.date || '')} · ${escapeHtml(item.source_session || '')}</div>
      <div class="ctx-item-content" contenteditable="true"
        onblur="editContext('${safeId}', this.textContent)">${escapeHtml(item.content || '')}</div>
      <div class="ctx-item-actions">
        <button onclick="deleteContext('${safeId}')" title="删除">✕</button>
      </div>
    </div>`;
  }).join('');
}

function deleteContext(id) {
  wsSend('context:delete', { id });
}

function editContext(id, content) {
  wsSend('context:edit', { id, content: content.trim() });
}

function showCtxStatus(msg, isError) {
  const el = document.getElementById('ctxStatus');
  el.style.display = 'block';
  el.textContent = msg;
  el.style.color = isError ? 'var(--context-red)' : 'var(--text-secondary)';
  if (!isError && !msg.includes('正在')) {
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }
}

/* ══════════════════════════════════════
   KEEPALIVE
══════════════════════════════════════ */
function toggleKeepalive() {
  const enabled = document.getElementById('keepaliveToggle').checked;
  wsSend('keepalive:toggle', { enabled });
  showKeepaliveStatus(enabled ? 'ON' : '', enabled ? 'ok' : '');
}

function showKeepaliveStatus(text, cls) {
  const el = document.getElementById('keepaliveStatus');
  el.textContent = text;
  el.className = 'keepalive-status' + (cls ? ' ' + cls : '');
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
connectWS();
</script>
